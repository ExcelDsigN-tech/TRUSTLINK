name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Contracts Required Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/trustlink
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'contracts/**'
      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test
      - name: Skip (no changes)
        if: steps.changes.outputs.changed != 'true'
        run: echo "No contract changes — skipping gate"

  frontend:
    name: Frontend Required Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'app/**'
      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci
      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build
      - name: Skip (no changes)
        if: steps.changes.outputs.changed != 'true'
        run: echo "No frontend changes — skipping gate"

  sdk:
    name: SDK Required Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'sdk/**'
      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci
      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build
      - name: Skip (no changes)
        if: steps.changes.outputs.changed != 'true'
        run: echo "No SDK changes — skipping gate"
